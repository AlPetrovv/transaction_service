
services:
  django:
    container_name: ts-django
    build: transaction_service/
    env_file:
      - ./envs/postgres.env
      - ./envs/django.env
    command: ["sh", "entrypoint.sh"]
    volumes:
      - ./transaction_service:/home/app/transaction_service
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    user: app
  postgres:
    container_name: ts-postgres
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./envs/postgres.env
    ports:
      - "5432:5432"
  redis:
    container_name: ts-redis
    image: redis:6.2.6-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  celery:
    container_name: ts-celery
    build: ./transaction_service
    env_file:
      - ./envs/postgres.env
      - ./envs/django.env
    command: celery -A transaction_service worker -l info
    volumes:
      - ./transaction_service:/home/app/transaction_service
    depends_on:
      - postgres
      - redis


volumes:
  postgres_data:
  redis_data:
